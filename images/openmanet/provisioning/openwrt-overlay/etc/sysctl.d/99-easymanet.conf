# EasyMANET tuning for wireless mesh links.
#
# net.ipv4.tcp_no_metrics_save=1
#   Stop the kernel from caching per-destination TCP RTT/ssthresh/cwnd.
#   On a slow, variable-latency mesh (HaLow s1g) a single early-life
#   retransmit caches a pathological cwnd that subsequent connections
#   inherit, collapsing TCP to ~one MSS per RTT (~35 kbps measured).
#   Disabling caching lets every new connection probe the link fresh.
#   Verified ~76x TCP throughput improvement (35 kbps -> 2.6 Mbps single
#   stream) on a 2 MHz HaLow link.
net.ipv4.tcp_no_metrics_save=1

# net.ipv4.tcp_mtu_probing=1
#   Enable path MTU discovery probing. Helps when BATMAN-adv or some
#   intermediary forces a smaller effective MSS than the interface MTU
#   suggests; without this, a black-holed ICMP-too-big can stall a
#   connection silently.
net.ipv4.tcp_mtu_probing=1
