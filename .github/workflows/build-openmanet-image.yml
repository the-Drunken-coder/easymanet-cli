name: Build OpenMANET Image

on:
  workflow_dispatch:
    inputs:
      openmanet_version:
        description: OpenMANET tag or branch to build
        required: false
        default: "1.6.5"
      board:
        description: OpenMANET board profile
        required: false
        default: "ekh-bcm2711"
      target:
        description: Firmware target suffix
        required: false
        default: "rpi4-mm6108-spi"
      jobs:
        description: Parallel OpenWrt make jobs inside Docker
        required: false
        default: "2"
      clean:
        description: Delete the cached OpenMANET source tree before building
        required: false
        type: boolean
        default: false
      rebuild_builder:
        description: Force a rebuild of the Docker builder image
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: build-openmanet-image-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build firmware
    runs-on: ubuntu-24.04
    timeout-minutes: 360

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          df -h

      - name: Check out repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c
        with:
          python-version: "3.11"

      - name: Install EasyMANET
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest -q

      - name: Prepare OpenMANET cache directory
        run: mkdir -p .openmanet-cache

      - name: Restore OpenMANET build cache
        id: openmanet-cache
        uses: actions/cache/restore@a7833574556fa59680c1b7cb190c1735db73ebf0
        with:
          path: .openmanet-cache
          key: openmanet-docker-cache-v1-${{ runner.os }}-${{ inputs.board }}-${{ inputs.openmanet_version }}-${{ hashFiles('easymanet/build.py', 'pyproject.toml', 'provisioning/extra-packages.txt', 'provisioning/openwrt-overlay/**') }}
          restore-keys: |
            openmanet-docker-cache-v1-${{ runner.os }}-${{ inputs.board }}-${{ inputs.openmanet_version }}-
            openmanet-docker-cache-v1-${{ runner.os }}-${{ inputs.board }}-

      - name: Build EasyMANET-flavored OpenMANET image
        id: build_image
        env:
          OPENMANET_VERSION: ${{ inputs.openmanet_version }}
          BOARD: ${{ inputs.board }}
          TARGET: ${{ inputs.target }}
          JOBS: ${{ inputs.jobs }}
          CLEAN: ${{ inputs.clean }}
          REBUILD_BUILDER: ${{ inputs.rebuild_builder }}
        run: |
          set -euo pipefail
          case "$OPENMANET_VERSION" in (""|*[!A-Za-z0-9._/-]*) echo "Invalid openmanet_version"; exit 1;; esac
          case "$BOARD" in (""|*[!A-Za-z0-9._-]*) echo "Invalid board"; exit 1;; esac
          case "$TARGET" in (""|*[!A-Za-z0-9._-]*) echo "Invalid target"; exit 1;; esac
          case "$JOBS" in (""|*[!0-9]*) echo "Invalid jobs"; exit 1;; esac
          if [ "$JOBS" -lt 1 ]; then
            echo "Invalid jobs"
            exit 1
          fi
          args=(
            image build
            --output-dir dist
            --openmanet-version "$OPENMANET_VERSION"
            --board "$BOARD"
            --target "$TARGET"
            --cache-dir .openmanet-cache
            --jobs "$JOBS"
          )
          if [ "$CLEAN" = "true" ]; then
            args+=(--clean)
          fi
          if [ "$REBUILD_BUILDER" = "true" ]; then
            args+=(--rebuild-builder)
          fi
          easymanet "${args[@]}"

      - name: Save OpenMANET build cache
        if: steps.build_image.outcome == 'success' && steps.openmanet-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@a7833574556fa59680c1b7cb190c1735db73ebf0
        with:
          path: .openmanet-cache
          key: ${{ steps.openmanet-cache.outputs.cache-primary-key }}

      - name: Upload firmware artifact
        if: steps.build_image.outcome == 'success'
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4
        with:
          name: openmanet-${{ inputs.openmanet_version }}-${{ inputs.target }}
          path: dist/*.img.gz
          retention-days: 7
          if-no-files-found: error
