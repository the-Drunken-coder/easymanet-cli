name: CLI Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: GitHub release tag to create. Leave blank to upload workflow artifacts only.
        required: false
        default: ""
      publish_pypi:
        description: Publish the Python package to PyPI using Trusted Publishing
        required: false
        type: boolean
        default: false
      source_repo:
        description: Authoring repository that generated this release
        required: false
        default: "unknown"
      source_ref:
        description: Authoring repository ref
        required: false
        default: "unknown"
      source_sha:
        description: Authoring repository commit SHA
        required: false
        default: "unknown"

permissions:
  contents: write

jobs:
  package:
    name: Build CLI package
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.11.19"

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Run tests
        run: pytest -q

      - name: Build distributions
        run: uv build --no-sources

      - name: Install wheel smoke test
        run: uv run --no-project --with dist/*.whl easymanet --help

      - name: Generate release manifest
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
          SOURCE_REPO: ${{ inputs.source_repo }}
          SOURCE_REF: ${{ inputs.source_ref }}
          SOURCE_SHA: ${{ inputs.source_sha }}
        run: |
          python - <<'PY'
          import datetime as dt
          import hashlib
          import json
          import os
          from pathlib import Path

          artifacts = []
          for path in sorted(Path("dist").iterdir()):
              if path.is_file():
                  artifacts.append({
                      "name": path.name,
                      "sha256": hashlib.sha256(path.read_bytes()).hexdigest(),
                      "bytes": path.stat().st_size,
                  })
          manifest = {
              "schema_version": 1,
              "generated_at": dt.datetime.now(dt.timezone.utc).isoformat(),
              "release_tag": os.environ["RELEASE_TAG"],
              "source_repo": os.environ["SOURCE_REPO"],
              "source_ref": os.environ["SOURCE_REF"],
              "source_sha": os.environ["SOURCE_SHA"],
              "public_repo": os.environ["GITHUB_REPOSITORY"],
              "public_sha": os.environ["GITHUB_SHA"],
              "run_id": os.environ["GITHUB_RUN_ID"],
              "artifacts": artifacts,
          }
          Path("dist/easymanet-cli-manifest.json").write_text(json.dumps(manifest, indent=2) + "\n")
          PY

      - name: Upload package artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: easymanet-cli-package
          path: dist/*
          retention-days: 14
          if-no-files-found: error

      - name: Create GitHub release
        if: inputs.release_tag != ''
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          SOURCE_REPO: ${{ inputs.source_repo }}
          SOURCE_REF: ${{ inputs.source_ref }}
          SOURCE_SHA: ${{ inputs.source_sha }}
        run: |
          set -euo pipefail
          notes="$(mktemp)"
          {
            echo "EasyMANET CLI package release."
            echo
            echo "Generated from ${SOURCE_REPO}@${SOURCE_REF} (${SOURCE_SHA})."
          } > "$notes"
          gh release create "$RELEASE_TAG" dist/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "$RELEASE_TAG" \
            --notes-file "$notes"

  publish_pypi:
    name: Publish Python package to PyPI
    needs: package
    if: inputs.publish_pypi
    runs-on: ubuntu-24.04
    environment: pypi
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: easymanet-cli-package
          path: dist

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.11.19"

      - name: Publish package to PyPI
        run: uv publish --trusted-publishing always dist/*.tar.gz dist/*.whl
