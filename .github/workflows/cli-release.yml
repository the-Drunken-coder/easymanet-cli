name: CLI Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: GitHub release tag to create. Leave blank to upload workflow artifacts only.
        required: false
        default: ""
      source_repo:
        description: Authoring repository that generated this release
        required: false
        default: "unknown"
      source_ref:
        description: Authoring repository ref
        required: false
        default: "unknown"
      source_sha:
        description: Authoring repository commit SHA
        required: false
        default: "unknown"

permissions:
  contents: write

jobs:
  package:
    name: Build CLI package
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip build
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest -q

      - name: Build distributions
        run: python -m build

      - name: Install wheel smoke test
        run: |
          python -m pip install --force-reinstall dist/*.whl
          easymanet --help

      - name: Generate release manifest
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
          SOURCE_REPO: ${{ inputs.source_repo }}
          SOURCE_REF: ${{ inputs.source_ref }}
          SOURCE_SHA: ${{ inputs.source_sha }}
        run: |
          python - <<'PY'
          import datetime as dt
          import hashlib
          import json
          import os
          from pathlib import Path

          artifacts = []
          for path in sorted(Path("dist").iterdir()):
              if path.is_file():
                  artifacts.append({
                      "name": path.name,
                      "sha256": hashlib.sha256(path.read_bytes()).hexdigest(),
                      "bytes": path.stat().st_size,
                  })
          manifest = {
              "schema_version": 1,
              "generated_at": dt.datetime.now(dt.UTC).isoformat(),
              "release_tag": os.environ["RELEASE_TAG"],
              "source_repo": os.environ["SOURCE_REPO"],
              "source_ref": os.environ["SOURCE_REF"],
              "source_sha": os.environ["SOURCE_SHA"],
              "public_repo": os.environ["GITHUB_REPOSITORY"],
              "public_sha": os.environ["GITHUB_SHA"],
              "run_id": os.environ["GITHUB_RUN_ID"],
              "artifacts": artifacts,
          }
          Path("dist/easymanet-cli-manifest.json").write_text(json.dumps(manifest, indent=2) + "\n")
          PY

      - name: Upload package artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: easymanet-cli-package
          path: dist/*
          retention-days: 14
          if-no-files-found: error

      - name: Create GitHub release
        if: inputs.release_tag != ''
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          SOURCE_REPO: ${{ inputs.source_repo }}
          SOURCE_REF: ${{ inputs.source_ref }}
          SOURCE_SHA: ${{ inputs.source_sha }}
        run: |
          set -euo pipefail
          notes="$(mktemp)"
          {
            echo "EasyMANET CLI package release."
            echo
            echo "Generated from ${SOURCE_REPO}@${SOURCE_REF} (${SOURCE_SHA})."
          } > "$notes"
          gh release create "$RELEASE_TAG" dist/*             --repo "$GITHUB_REPOSITORY"             --title "$RELEASE_TAG"             --notes-file "$notes"
