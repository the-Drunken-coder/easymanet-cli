name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"

      - name: Install EasyMANET
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Import smoke test
        run: easymanet --help

      - name: Run unit tests
        run: pytest -q --cov=easymanet --cov-report=term-missing --cov-fail-under=50

      - name: Syntax-check overlay shell scripts
        run: |
          overlay_dir=provisioning/openwrt-overlay
          if [ ! -d "$overlay_dir" ]; then
            overlay_dir=images/openmanet/provisioning/openwrt-overlay
          fi
          find "$overlay_dir" \
            \( -name '*.sh' -o -path '*/etc/init.d/*' -o -path '*/etc/uci-defaults/*' \) \
            -type f -print0 | xargs -0 sh -n

      - name: Verify overlay files are packaged
        run: |
          if [ -f tools/packaging/verify_overlay_packaging.py ]; then
            python tools/packaging/verify_overlay_packaging.py
          else
            python scripts/verify_overlay_packaging.py
          fi

  package:
    name: Package smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"

      - name: Build package
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Install wheel smoke test
        run: |
          python -m pip install dist/*.whl
          easymanet --help
